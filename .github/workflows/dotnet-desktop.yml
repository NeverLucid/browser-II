# .NET Core build workflow for MyBrowserShell (WinForms, net8.0-windows)

name: .NET Core Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    env:
      Solution_Name: browser II.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET workload
    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Add MSBuild to PATH
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Restore NuGet packages
    - name: Restore the application
      run: msbuild "$env:Solution_Name" /t:Restore /p:Configuration=$env:Configuration
      env:
        Configuration: ${{ matrix.configuration }}

    # Build the solution
    - name: Build the application
      run: msbuild "$env:Solution_Name" /p:Configuration=$env:Configuration /p:Platform="Any CPU"
      env:
        Configuration: ${{ matrix.configuration }}

    # Run smoke tests (block scalar avoids & being parsed as a YAML anchor)
    - name: Run smoke tests
      shell: pwsh
      run: |
        $exe = ".\MyBrowserShell.SmokeTests\bin\$env:Configuration\net8.0-windows\MyBrowserShell.SmokeTests.exe"
        & $exe
        exit $LASTEXITCODE
      env:
        Configuration: ${{ matrix.configuration }}

    # Upload build output
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MyBrowserShell-${{ matrix.configuration }}
        path: MyBrowserShell\bin\${{ matrix.configuration }}\net8.0-windows\
