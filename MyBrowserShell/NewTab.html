<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Private New Tab</title>
<style>
    :root {
        color-scheme: dark;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #121317;
        color: #f0f3f6;
    }

    body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
            linear-gradient(135deg, rgba(36, 184, 133, 0.18), transparent 34%),
            linear-gradient(315deg, rgba(0, 120, 212, 0.18), transparent 36%),
            #121317;
    }

    main {
        width: min(840px, calc(100vw - 48px));
    }

    .masthead {
        margin-bottom: 26px;
    }

    h1 {
        margin: 0 0 8px;
        font-size: clamp(32px, 7vw, 58px);
        font-weight: 720;
        letter-spacing: 0;
    }

    .status {
        color: #a1a9b5;
        font-size: 15px;
    }

    form {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
    }

    input {
        flex: 1;
        min-width: 0;
        padding: 14px 16px;
        border: 1px solid #48505d;
        border-radius: 8px;
        background: #1c1e24;
        color: #f0f3f6;
        font: inherit;
        outline: none;
    }

    input:focus {
        border-color: #24b885;
    }

    button, a {
        border: 1px solid #48505d;
        border-radius: 8px;
        background: #272a32;
        color: #f0f3f6;
        font: inherit;
        text-decoration: none;
    }

    button {
        padding: 0 18px;
        cursor: pointer;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 12px;
    }

    .quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 24px;
    }

    .quick-actions a {
        padding: 9px 12px;
        font-size: 13px;
    }

    .tile {
        display: block;
        padding: 14px;
        min-height: 58px;
    }

    .tile strong {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 15px;
    }

    .tile span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-top: 6px;
        color: #a1a9b5;
        font-size: 12px;
    }

    .empty {
        border: 1px dashed #48505d;
        border-radius: 8px;
        padding: 18px;
        color: #a1a9b5;
    }
</style>
</head>
<body>
<main>
    <section class="masthead">
        <h1>Private New Tab</h1>
        <div class="status" id="status">Shields on</div>
    </section>

    <form id="searchForm">
        <input id="search" autocomplete="off" autofocus placeholder="Search or enter address">
        <button type="submit">Go</button>
    </form>

    <nav class="quick-actions" aria-label="Quick actions">
        <a href="mybrowsershell://bookmarks">Bookmarks</a>
        <a href="mybrowsershell://downloads">Downloads</a>
        <a href="mybrowsershell://settings">Settings</a>
    </nav>

    <section id="bookmarks" class="grid" aria-label="Bookmarks">
        <div class="empty">Save pages with the star button and they will appear here.</div>
    </section>
</main>

<script>
const search = document.getElementById("search");
const bookmarks = document.getElementById("bookmarks");
const status = document.getElementById("status");
let searchUrl = "https://duckduckgo.com/?q=";

function resolveAddress(value) {
    const text = value.trim();
    if (!text) return "https://duckduckgo.com/";
    if (/^https?:\/\//i.test(text)) return text;
    if (!/\s/.test(text) && (text.includes(".") || text.includes(":") || text.toLowerCase().startsWith("localhost"))) {
        return "https://" + text;
    }
    return searchUrl + encodeURIComponent(text);
}

document.getElementById("searchForm").addEventListener("submit", event => {
    event.preventDefault();
    window.location.href = resolveAddress(search.value);
});

window.MyBrowserShellNewTab = {
    applyData(data) {
        status.textContent = data.shields || "Shields on";
        searchUrl = data.searchUrl || searchUrl;
        bookmarks.innerHTML = "";

        if (!data.bookmarks || data.bookmarks.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "Save pages with the star button and they will appear here.";
            bookmarks.appendChild(empty);
            return;
        }

        data.bookmarks.forEach(bookmark => {
            const link = document.createElement("a");
            link.className = "tile";
            link.href = bookmark.url;

            const title = document.createElement("strong");
            title.textContent = bookmark.title || "Untitled";
            const url = document.createElement("span");
            url.textContent = bookmark.url;

            link.append(title, url);
            bookmarks.appendChild(link);
        });
    }
};
</script>
</body>
</html>
